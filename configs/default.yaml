# SR Segmentation Configuration

device: cuda  # cuda or cpu

# Model paths (absolute or relative to project root)
models:
  speciesnet: models/yolov8n.pt  # Will auto-download if not exists
  sam: models/sam_vit_h.pth
  bisenet: models/face_parsing.pth
  person_detector: models/yolov8n.pt

# SAM settings
sam:
  model_type: vit_h
  checkpoint: models/sam_vit_h.pth
  points_per_side: 32
  pred_iou_thresh: 0.88
  stability_score_thresh: 0.95
  min_mask_region_area: 100

# SpeciesNet settings
speciesnet:
  confidence_threshold: 0.5
  furry_classes:
    - cat
    - dog
    - horse
    - cow
    - sheep
    - rabbit
    - bear
    - fox
    - wolf
    - deer
    - squirrel
    - mouse
    - rat
    - hamster
    - gerbil
    - ferret
    - weasel
    - otter
    - badger
    - hedgehog
    - llama
    - alpaca
    - goat
    - pig

# BiSeNet settings
bisenet:
  num_classes: 19
  pretrained: face_parser

# Person detection
person_detector:
  model: yolov8n
  confidence_threshold: 0.5

# Mask merging
merging:
  gaussian_sigma: 3.0
  edge_blur_radius: 5
  min_hair_area: 100

# Processing
processing:
  max_image_size: 2048
  batch_size: 1

# Output
output:
  save_masks: true
  save_visualization: true
  output_dir: output
